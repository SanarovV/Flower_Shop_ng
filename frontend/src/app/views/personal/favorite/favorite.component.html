<div class="favorite">
  <div class="container">

    <div class="favorite-title">Избранное</div>

    <div class="favorite-empty" *ngIf="!products || (products && products.length === 0)">
      <div>В избранном нет товаров</div>
      <button class="button" routerLink="/catalog">В каталог</button>
    </div>

    <div class="favorite-products" *ngIf="products && products.length > 0">
      <div class="favorite-product" *ngFor="let productFavorite of products">
        <div class="favorite-product-image" style="background-image: url({{serverStaticPath + productFavorite.image}})"></div>
        <div class="favorite-product-name">{{productFavorite.name}}</div>
        <div class="favorite-product-price">{{productFavorite.price}} BYN</div>
        <div class="favorite-product-action">
          <count-selector *ngIf="productFavorite.countInCart"
                          [count]="productFavorite.countInCart"
                          (onCountChange)="updateCount(productFavorite.id, $event)"></count-selector>
          <button class="button" *ngIf="!productFavorite.countInCart" (click)="addToCart(productFavorite.id)">В корзину</button>
          <button class="button button-transparent button-in-cart"
                  *ngIf="productFavorite.countInCart" (click)="removeFromCart(productFavorite.id)">
            <span>В корзине</span>
            <span>Удалить</span>
          </button>
        </div>
        <div class="favorite-product-remove" (click)="removeFromFavorites(productFavorite.id)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="1.93562" y1="2.6499" x2="13.9564" y2="14.6707" stroke="#A8ABA7" stroke-linecap="round"/>
            <line x1="13.9238" y1="2.62996" x2="1.90301" y2="14.6508" stroke="#A8ABA7" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
